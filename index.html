<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enrededados Grooming — grooming de perros y gatos a domicilio y en spa, en Bogotá."
    />
    <title>Enrededados Grooming | Groomer a domicilio en Bogotá</title>

    <!--
      TEMPORAL: URL de GitHub Pages, no es el dominio definitivo del negocio.
      Cuando se publique en el dominio final, actualizar SITE_URL en las
      etiquetas de abajo (canonical, og:url, twitter, JSON-LD) y quitar el
      "noindex" de la meta robots + el Disallow de public/robots.txt.
    -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://keniercccl.github.io/enredados-grooming-landing/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Enrededados Grooming" />
    <meta property="og:title" content="Enrededados Grooming | Groomer a domicilio en Bogotá" />
    <meta
      property="og:description"
      content="Grooming de perros y gatos a domicilio y en spa, en Bogotá."
    />
    <meta property="og:url" content="https://keniercccl.github.io/enredados-grooming-landing/" />
    <meta
      property="og:image"
      content="https://keniercccl.github.io/enredados-grooming-landing/favicon.svg"
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Enrededados Grooming | Groomer a domicilio en Bogotá" />
    <meta
      name="twitter:description"
      content="Grooming de perros y gatos a domicilio y en spa, en Bogotá."
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Enrededados Grooming",
        "description": "Grooming de perros y gatos a domicilio y en spa, en Bogotá.",
        "telephone": "+573236596976",
        "areaServed": ["Usaquén", "Chapinero", "Suba"],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Bogotá",
          "addressCountry": "CO"
        }
      }
    </script>

    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: decodifica la ruta redirigida por 404.html
      // https://github.com/rafgraph/spa-github-pages
      ;(function (l) {
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map((s) => s.replace(/~and~/g, '&'))
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
