<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enrededados Grooming — grooming de perros y gatos a domicilio y en spa, en Bogotá."
    />
    <title>Enrededados Grooming | Groomer a domicilio en Bogotá</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: decodifica la ruta redirigida por 404.html
      // https://github.com/rafgraph/spa-github-pages
      ;(function (l) {
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map((s) => s.replace(/~and~/g, '&'))
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
